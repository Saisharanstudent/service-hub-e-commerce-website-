<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceHub Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-blue-100 min-h-screen">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-3xl font-bold text-violet-700 mb-6">
My Dashboard
</h1>

<div id="loading">Loading...</div>
<div id="content" style="display:none;"></div>

<!-- PROFILE CARD -->

<div id="content" style="display:none;">

  <h2 id="userName" class="text-xl font-bold mt-4"></h2>
  <p id="userEmail" class="text-gray-600 mb-4"></p>

</div>

<img id="profileImage"
class="w-28 h-28 rounded-full object-cover bg-white border-4 border-violet-500 p-1"
src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff">


<!-- BOOKINGS -->

<div class="bg-violet-200 p-6 rounded-2xl shadow">

<h2 class="text-xl font-bold mb-4">
My Bookings
</h2>

<div id="bookingList" class="space-y-3">

<p class="text-gray-400">Loading bookings...</p>

</div>

</div>

<button onclick="logout()"
class="mt-6 bg-red-500 text-white px-6 py-2 rounded-xl font-bold">
Logout
</button>

</div>

<script type="module">

  import { getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

import { 
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDaU6O2PsK71P6BzfjPBjk0_aT4Oeby5HA",
  authDomain: "servicehub-app-82d26.firebaseapp.com",
  projectId: "servicehub-app-82d26",
  storageBucket: "servicehub-app-82d26.firebasestorage.app",
  messagingSenderId: "453789517777",
  appId: "1:453789517777:web:3bff9a1589552c2bd902f0",
  measurementId: "G-XGC89MQJRV"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);

onAuthStateChanged(auth, async (user) => {

  document.getElementById("loading").style.display = "none";

});

onAuthStateChanged(auth, async (user) => {

  document.getElementById("loading").style.display = "none";

  if(user){

    document.getElementById("content").style.display = "block";

    document.getElementById("userName").innerText =
      user.displayName || "User";

    document.getElementById("userEmail").innerText =
      user.email;

  } else {
    window.location.href = "index.html";
  }

});

// LOAD BOOKINGS

async function loadBookings(uid){

const bookingList = document.getElementById("bookingList");

bookingList.innerHTML = "";

const q = query(
collection(db,"bookings"),
where("userId","==",uid)
);

const querySnapshot = await getDocs(q);

if(querySnapshot.empty){

bookingList.innerHTML =
"<p class='text-gray-400'>No bookings yet</p>";

return;

}

querySnapshot.forEach((doc)=>{

const data = doc.data();

bookingList.innerHTML += `

<div class="border p-4 rounded-xl">

<p class="font-bold">${data.service}</p>

<p class="text-sm text-gray-500">
Date: ${data.date} | Time: ${data.time}
</p>

<p class="text-sm text-violet-600 font-bold">
Status: ${data.status}

<p>Category: ${data.category || "-"}</p>
<p>Price: ₹${data.price || "-"}</p>
<p>Technician: ${data.technician || "Not Assigned"}</p>
</p>

</div>

`;

});

}


// LOGOUT
window.logout = function(){
  signOut(auth)
    .then(() => {
      alert("Logged out successfully");
      window.location.reload();
    })
    .catch((error) => {
      console.error(error);
      alert("Logout failed");
    });
  }

</script>

</body>
</html>
